<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>きもち・こうどう カード</title>
    <style>
        /* 全体のデザイン調整 */
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif;
            background-color: #f0f8ff;
            margin: 0;
            padding: 20px;
            text-align: center;
            user-select: none; /* 誤操作でのテキスト選択を防止 */
        }

        h1 {
            color: #333;
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1.2rem;
            color: #666;
            margin-bottom: 20px;
        }

        /* カードを並べるエリア */
        .card-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }

        /* カード1枚のデザイン */
        .card {
            background-color: white;
            border: 4px solid #fff;
            border-radius: 20px;
            box-shadow: 0 6px 10px rgba(0,0,0,0.1);
            width: 250px; /* 画像に合わせて少し大きく */
            padding: 10px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            overflow: hidden; /* 画像がはみ出ないように */
        }

        /* ホバー・クリック時の動き */
        .card:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
        }

        .card:active {
            transform: scale(0.95);
        }

        /* 生成画像を表示するためのスタイル */
        .card-image-container {
            width: 100%;
            height: 180px; /* カード内の画像表示エリアの高さ */
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 15px; /* 画像も角丸に */
        }

        .card-image {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain; /* 画像を枠内に収める */
        }

        /* カードの文字 */
        .card-text {
            font-size: 1.5rem;
            font-weight: bold;
            color: #444;
            display: block;
            margin-top: 10px;
        }

        /* 選択した結果を表示するエリア */
        #result-area {
            margin-top: 40px;
            padding: 20px;
            background-color: #fff;
            border-radius: 20px;
            border: 3px dashed #ffb6c1;
            display: inline-block;
            min-width: 300px;
        }

        .result-title {
            font-size: 1.2rem;
            color: #ff69b4;
            margin-bottom: 10px;
        }

        .result-content {
            font-size: 1.8rem;
            font-weight: bold;
            color: #333;
        }

        /* 結果エリアの画像表示 */
        .result-image {
            max-width: 150px;
            max-height: 150px;
            margin-top: 10px;
            object-fit: contain;
        }

        /* ボタンのデザイン */
        .btn {
            background-color: #ff7f50;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 1.2rem;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .btn:hover { background-color: #ff6347; }
        
        /* 非表示用クラス */
        .hidden { display: none; }
    </style>
</head>
<body>

    <h1 id="main-title">いまの きもちは どれかな？</h1>
    <p class="subtitle" id="sub-title">あてはまるものを えらんでね</p>

    <div id="emotion-screen" class="card-container">
        <div class="card" onclick="selectEmotion('うれしい', 'happy')">
            <div class="card-image-container">
                <img src="image_0.png" alt="うれしい" class="card-image" style="object-position: -5px -5px; transform: scale(1.1);">
            </div>
            <span class="card-text">うれしい</span>
        </div>
        <div class="card" onclick="selectEmotion('かなしい', 'sad')">
            <div class="card-image-container">
                <img src="image_0.png" alt="かなしい" class="card-image" style="object-position: -270px -5px; transform: scale(1.1);">
            </div>
            <span class="card-text">かなしい</span>
        </div>
        <div class="card" onclick="selectEmotion('おこってる', 'angry')">
            <div class="card-image-container">
                <img src="image_0.png" alt="おこってる" class="card-image" style="object-position: -535px -5px; transform: scale(1.1);">
            </div>
            <span class="card-text">おこってる</span>
        </div>
    </div>

    <div id="action-screen" class="card-container hidden">
        <div class="card" onclick="selectAction('ごはんを たべたい', 'eat')">
            <div class="card-image-container">
                <img src="image_0.png" alt="たべたい" class="card-image" style="object-position: -5px -270px; transform: scale(1.1);">
            </div>
            <span class="card-text">たべたい</span>
        </div>
        <div class="card" onclick="selectAction('おもちゃで あそびたい', 'play')">
            <div class="card-image-container">
                <img src="image_0.png" alt="あそびたい" class="card-image" style="object-position: -270px -270px; transform: scale(1.1);">
            </div>
            <span class="card-text">あそびたい</span>
        </div>
        <div class="card" onclick="selectAction('おやすみしたい', 'sleep')">
            <div class="card-image-container">
                <img src="image_0.png" alt="ねたい" class="card-image" style="object-position: -535px -270px; transform: scale(1.1);">
            </div>
            <span class="card-text">ねたい</span>
        </div>
    </div>

    <div id="result-area">
        <div class="result-title">あなたがつたえたいこと</div>
        <div id="result-text" class="result-content">まだえらんでいないよ</div>
        <div id="result-images" class="hidden">
            <img id="result-emotion-img" src="image_0.png" class="result-image">
            <img id="result-action-img" src="image_0.png" class="result-image hidden">
        </div>
        <button id="reset-btn" class="btn hidden" onclick="resetApp()">もういちど えらぶ</button>
    </div>

    <script>
        // 選択された内容を記憶する変数
        let chosenEmotionText = "";
        let chosenActionText = "";

        // 画像の切り抜き位置を定義（生成画像に合わせて調整）
        const imagePositions = {
            'happy': '-5px -5px',
            'sad': '-270px -5px',
            'angry': '-535px -5px',
            'eat': '-5px -270px',
            'play': '-270px -270px',
            'sleep': '-535px -270px'
        };

        // 1. きもちを選んだときの処理
        function selectEmotion(emotionText, emotionKey) {
            chosenEmotionText = emotionText;

            // 結果エリアにテキストを表示
            document.getElementById('result-text').innerHTML = `【${emotionText}】`;
            
            // 結果エリアに画像を表示
            const emotionImg = document.getElementById('result-emotion-img');
            emotionImg.style.objectPosition = imagePositions[emotionKey];
            document.getElementById('result-images').classList.remove('hidden');
            document.getElementById('result-action-img').classList.add('hidden'); // 行動画像は隠す

            // 画面を切り替えて「やりたいこと」を選ばせる
            setTimeout(() => {
                document.getElementById('main-title').innerText = "なにを したいのかな？";
                document.getElementById('sub-title').innerText = "あてはまるイラストを えらんでね";
                document.getElementById('emotion-screen').classList.add('hidden');
                document.getElementById('action-screen').classList.remove('hidden');
            }, 600); // クリック感を味わってもらうため少しだけディレイ
        }

        // 2. やりたいことを選んだときの処理
        function selectAction(actionText, actionKey) {
            chosenActionText = actionText;
            
            // 最終的なタイトルを表示
            document.getElementById('main-title').innerText = "おしえてくれて ありがとう！";
            document.getElementById('sub-title').innerText = "";
            document.getElementById('action-screen').classList.add('hidden');
            
            // 結果を画面に表示
            document.getElementById('result-text').innerHTML = `いま 【${chosenEmotionText}】 から、<br>【${actionText}】`;
            
            // 結果エリアの行動画像を表示
            const actionImg = document.getElementById('result-action-img');
            actionImg.style.objectPosition = imagePositions[actionKey];
            actionImg.classList.remove('hidden');

            document.getElementById('reset-btn').classList.remove('hidden');
        }

        // 3. 最初に戻る処理
        function resetApp() {
            chosenEmotionText = "";
            chosenActionText = "";
            
            document.getElementById('main-title').innerText = "いまの きもちは どれかな？";
            document.getElementById('sub-title').innerText = "あてはまるものを えらんでね";
            document.getElementById('result-text').innerText = "まだえらんでいないよ";
            
            document.getElementById('emotion-screen').classList.remove('hidden');
            document.getElementById('action-screen').classList.add('hidden');
            document.getElementById('result-btn').classList.add('hidden');
            document.getElementById('result-images').classList.add('hidden');
        }
    </script>
</body>
</html>
