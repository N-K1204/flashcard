<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STORY SELECTOR - COMPLETE GAME EDITION</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="game-bg">
        <div class="scanlines"></div>
        <div class="grid-lines"></div>
    </div>

    <div class="main-interface">
        
        <header class="ui-header">
            <div class="logo-area">
                <span class="system-tag">SYSTEM v2.6</span>
                <h1 class="main-logo">STORY CHOOSE</h1>
            </div>
            
            <div class="route-selector">
                <button class="route-btn active" id="btn-day" onclick="changeRoute('day')">
                    <span class="mode-num">01</span> DAY SIDE (通常)
                </button>
                <button class="route-btn" id="btn-night" onclick="changeRoute('night')">
                    <span class="mode-num">02</span> NIGHT SIDE (不調)
                </button>
            </div>
        </header>

        <main class="panel-stage">
            
            <div id="grid-day" class="panel-grid active">
                <div class="panel-slot type-day" onclick="panelSelect(this, 'image0', 'DAY ROUTE: 01', 'ここから全ての物語がスタートする。まだ体調は万全、エネルギーに満ち溢れている。')">
                    <div class="slot-frame">
                        <img src="image0.png" alt="DAY 01">
                    </div>
                </div>
                <div class="panel-slot type-day" onclick="panelSelect(this, 'image1', 'DAY ROUTE: 02', '少しずつ周囲の状況が動き出す。順調にタスクを消化している状態。')">
                    <div class="slot-frame">
                        <img src="image1.png" alt="DAY 02">
                    </div>
                </div>
                <div class="panel-slot type-day" onclick="panelSelect(this, 'image2', 'DAY ROUTE: 03', '中盤戦に突入。イベントが発生し、物語がさらに深みを増していく。')">
                    <div class="slot-frame">
                        <img src="image2.png" alt="DAY 03">
                    </div>
                </div>
                <div class="panel-slot type-day" onclick="panelSelect(this, 'image3', 'DAY ROUTE: 04', '折り返し地点を通過。ここまでの選択が後半の展開に影響を与える。')">
                    <div class="slot-frame">
                        <img src="image3.png" alt="DAY 04">
                    </div>
                </div>
                <div class="panel-slot type-day" onclick="panelSelect(this, 'image4', 'DAY ROUTE: 05', '終盤の兆し。これまでの行動の成果が形になり始める時間帯。')">
                    <div class="slot-frame">
                        <img src="image4.png" alt="DAY 05">
                    </div>
                </div>
                <div class="panel-slot type-day" onclick="panelSelect(this, 'image5', 'DAY ROUTE: 06', 'DAY SIDE 最終章。無事にミッションをクリアし、次のステップへ。')">
                    <div class="slot-frame">
                        <img src="image5.png" alt="DAY 06">
                    </div>
                </div>
            </div>

            <div id="grid-night" class="panel-grid">
                <div class="panel-slot type-yellow" onclick="panelSelect(this, 'image6', 'CONDITION: トイレにいきたい', '緊急ステータス：★☆☆ / 最優先で処理すべき生理欲求が発生。ルート確保を急げ。')">
                    <div class="slot-frame">
                        <img src="image6.png" alt="トイレにいきたい">
                    </div>
                </div>
                <div class="panel-slot type-magenta" onclick="panelSelect(this, 'image7', 'CONDITION: おなかいたい', '緊急ステータス：★★★ / 持続的なダメージデバフを検知。ただちに温かい環境で休息せよ。')">
                    <div class="slot-frame">
                        <img src="image7.png" alt="おなかいたい">
                    </div>
                </div>
                <div class="panel-slot type-blue" onclick="panelSelect(this, 'image8', 'CONDITION: あたまいたい', '緊急ステータス：★★☆ / 思考プロセスの処理速度が低下中。画面の輝度を下げて静養を推奨。')">
                    <div class="slot-frame">
                        <img src="image8.png" alt="あたまいたい">
                    </div>
                </div>
                <div class="panel-slot type-orange" onclick="panelSelect(this, 'image9', 'CONDITION: おなかすいた', '緊急ステータス：★☆☆ / 内部燃料が枯渇。カロリーおよびハイドレーションの補給が必要。')">
                    <div class="slot-frame">
                        <img src="image9.png" alt="おなかすいた">
                    </div>
                </div>
                <div class="panel-slot type-purple" onclick="panelSelect(this, 'image10', 'CONDITION: ねれない', '緊急ステータス：★★☆ / 精神ログのクローズに失敗。リラックスサウンドの導入を検討。')">
                    <div class="slot-frame">
                        <img src="image10.png" alt="ねれない">
                    </div>
                </div>
                <div class="panel-slot type-red" onclick="panelSelect(this, 'CONDITION: おしごといやだ', '緊急ステータス：LIMIT OVER / メンタル耐久値がゼロ。本日の全ミッションを強制終了します。')">
                    <div class="slot-frame">
                        <img src="image11.png" alt="おしごといやだ">
                    </div>
                </div>
            </div>

        </main>

        <footer class="status-window">
            <div class="window-border"></div>
            <div class="info-layout">
                <div class="preview-box">
                    <div id="preview-img-placeholder" class="placeholder-text">NO DATA</div>
                    <img id="preview-img" src="" alt="Preview" style="display: none;">
                </div>
                <div class="text-box">
                    <div id="status-title" class="status-title">SELECT A CARD</div>
                    <div id="status-desc" class="status-desc">カードを選択すると、ここに詳細なゲームステータスとフレーバーテキストがロードされます。</div>
                </div>
            </div>
        </footer>

    </div>

    <script>
        // 昼ルートと夜ルートを完全に切り替える関数
        function changeRoute(route) {
            // 全てのルートボタンとグリッドからアクティブクラスを削除
            document.querySelectorAll('.route-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.panel-grid').forEach(grid => grid.classList.remove('active'));
            
            // 選択されたルートをアクティブにする
            if(route === 'day') {
                document.getElementById('btn-day').classList.add('active');
                document.getElementById('grid-day').classList.add('active');
            } else {
                document.getElementById('btn-night').classList.add('active');
                document.getElementById('grid-night').classList.add('active');
            }
            // ルート変更時に下部の選択情報を初期状態にリセット
            resetWindow();
        }

        // カードスロットが選択されたときの処理関数
        function panelSelect(element, imgName, title, desc) {
            // 同じグリッド内の他のカードから選択状態（selected）を解除
            document.querySelectorAll('.panel-slot').forEach(slot => slot.classList.remove('selected'));
            
            // クリックされたカードに選択状態を付与
            element.classList.add('selected');

            // 下部ウィンドウのパーツを取得
            const previewImg = document.getElementById('preview-img');
            const placeholder = document.getElementById('preview-img-placeholder');
            
            // プレビュー画像の切り替え
            placeholder.style.display = 'none';
            previewImg.style.display = 'block';
            previewImg.src = imgName + '.png';

            // テキスト情報の書き換え
            document.getElementById('status-title').innerText = title;
            document.getElementById('status-desc').innerText = desc;
        }

        // ウィンドウ表示のリセット関数
        function resetWindow() {
            document.querySelectorAll('.panel-slot').forEach(slot => slot.classList.remove('selected'));
            document.getElementById('preview-img').style.display = 'none';
            document.getElementById('preview-img-placeholder').style.display = 'flex';
            document.getElementById('status-title').innerText = 'SELECT A CARD';
            document.getElementById('status-desc').innerText = 'カードを選択すると、ここに詳細なゲームステータスとフレーバーテキストがロードされます。';
        }
    </script>

</body>
</html>
